services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: linuxer
      POSTGRES_PASSWORD: 12345678
      POSTGRES_DB: vibe
    volumes:
      - pgdata:/var/lib/postgresql/data
      # - ./backend-node/db:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U linuxer -d vibe"]
      interval: 5s
      timeout: 3s
      retries: 10
    ports:
      - "6432:5432"

  valkey:
    image: valkey/valkey:8-alpine
    restart: unless-stopped
    volumes:
      - valkeydata:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    ports:
      - "9615:6379"

  storage-server:
    image: ghcr.io/linuxer41/vibe-storage-server:latest
    pull_policy: always
    restart: unless-stopped
    volumes:
      - media:/app/media
      - cache:/app/cache
    # ports:
    #   - "3002:3002"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3002/health"]
      interval: 10s
      timeout: 3s
      retries: 5

  kafka:
    image: apache/kafka:latest
    restart: unless-stopped
    environment:
      KAFKA_NODE_ID: "1"
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://vibe-app.iathings.com:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: "3"
      KAFKA_DEFAULT_REPLICATION_FACTOR: "1"
    volumes:
      - kafkadata:/bitnami/kafka
    healthcheck:
      test: ["CMD", "kafka-topics.sh", "--list", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 5s
      retries: 10
    ports:
      - "9092:9092"

  backend-node:
    image: ghcr.io/linuxer41/vibe-backend:latest
    pull_policy: always
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
      kafka:
        condition: service_started
    environment:
      DATABASE_URL: postgres://linuxer:12345678@postgres:5432/vibe
      VALKEY_URL: redis://valkey:6379
      KAFKA_BROKER: kafka:9092
      PORT: "3000"
      NODE_ENV: production
      STORAGE_URL: http://storage-server:3002
    # ports:
    #   - "3000:3000"

  backend-rust:
    image: ghcr.io/linuxer41/vibe-backend-rust:latest
    pull_policy: always
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://linuxer:12345678@postgres:5432/vibe
      VALKEY_URL: redis://valkey:6379
      PORT: "3001"
      STORAGE_URL: http://storage-server:3002
      RUST_LOG: info
    # ports:
    #   - "3001:3001"

  frontend:
    image: ghcr.io/linuxer41/vibe-frontend:latest
    pull_policy: always
    restart: unless-stopped
    depends_on:
      - backend-node
    # ports:
    #   - "5173:80"

  frontend-preview:
    image: ghcr.io/linuxer41/vibe-frontend-preview:latest
    pull_policy: always
    restart: unless-stopped
    depends_on:
      - backend-node
    # ports:
    #   - "4173:4173"

volumes:
  pgdata:
  valkeydata:
  kafkadata:
  media:
  cache:
