name: Frontend

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend.yml'
  pull_request:
    branches: [main]
    paths:
      - 'frontend/**'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}-frontend
  UPLOAD_SECRET: ${{ secrets.UPLOAD_SECRET }}
  UPLOAD_URL: ${{ secrets.UPLOAD_URL }}

jobs:
  docker:
    name: Docker (linux/amd64 + linux/arm64)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push (multi-arch)
        uses: docker/build-push-action@v6
        with:
          context: frontend
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  web:
    name: Web Docker (nginx)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}-frontend-web
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push (multi-arch)
        uses: docker/build-push-action@v6
        with:
          context: frontend
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  tauri-windows:
    name: Tauri Windows (.msi)
    runs-on: windows-latest
    permissions:
      contents: write
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        id: tauri_build
        with:
          projectPath: frontend
          args: --bundles msi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: vibe-windows-x64
          path: frontend/src-tauri/target/release/bundle/msi/*.msi

      - name: Upload MSI to landing
        if: ${{ env.UPLOAD_SECRET != '' && env.UPLOAD_URL != '' }}
        shell: pwsh
        run: |
          $msi = Get-ChildItem frontend/src-tauri/target/release/bundle/msi/*.msi | Select-Object -First 1
          if (-not $msi) { Write-Host "No MSI found"; exit 0 }
          $filename = $msi.Name
          curl -X POST "$env:UPLOAD_URL/api/upload/windows/x86_64" `
            -H "Authorization: Bearer $env:UPLOAD_SECRET" `
            -H "Content-Disposition: attachment; filename=`"$filename`"" `
            --data-binary "@$($msi.FullName)"

  tauri-android:
    name: Tauri Android (.apk)
    runs-on: ubuntu-latest
    permissions:
      contents: write
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android
          components: rust-src

      - name: Install Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install Tauri Android prerequisites
        run: |
          cargo install tauri-cli --version "^2"
          npm install -g @tauri-apps/cli

      - name: Initialize Android project
        run: cargo tauri android init

      - name: Build Android APK
        run: cargo tauri android build --apk --target aarch64
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: vibe-android-arm64
          path: frontend/src-tauri/gen/android/app/build/outputs/apk/universal/release/*.apk

      - name: Upload APK to landing
        if: ${{ env.UPLOAD_SECRET != '' && env.UPLOAD_URL != '' }}
        run: |
          apk=$(ls frontend/src-tauri/gen/android/app/build/outputs/apk/universal/release/*.apk 2>/dev/null | head -1)
          if [ -z "$apk" ]; then echo "No APK found"; exit 0; fi
          filename=$(basename "$apk")
          curl -X POST "$UPLOAD_URL/api/upload/android/arm64" \
            -H "Authorization: Bearer $UPLOAD_SECRET" \
            -H "Content-Disposition: attachment; filename=\"$filename\"" \
            --data-binary "@$apk"
