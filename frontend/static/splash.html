<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    display: flex; align-items: center; justify-content: center;
    height: 100vh; background: #0d0d0d; color: #fff;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    user-select: none; overflow: hidden;
  }
  .splash { display: flex; flex-direction: column; align-items: center; gap: 16px; }
  .logo { animation: pulse 1.5s ease-in-out infinite; }
  @keyframes pulse {
    0%, 100% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.08); opacity: 0.8; }
  }
  h1 { font-size: 28px; font-weight: 700; letter-spacing: 1px; }
  .bar { width: 180px; height: 3px; border-radius: 2px; background: rgba(255,255,255,0.1); overflow: hidden; }
  .fill { height: 100%; border-radius: 2px; background: #a855f7; width: 0%; transition: width 0.3s ease; }
  .hint { font-size: 12px; opacity: 0.4; }
</style>
</head>
<body>
<div class="splash">
  <div class="logo">
    <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="#a855f7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M9 18V5l12-2v13"/>
      <circle cx="6" cy="18" r="3"/>
      <circle cx="18" cy="16" r="3"/>
    </svg>
  </div>
  <h1>Vibe</h1>
  <div class="bar"><div class="fill" id="progress"></div></div>
  <p class="hint">Cargando...</p>
</div>
<script>
  (function() {
    var p = 0, el = document.getElementById('progress');
    var interval = setInterval(function() {
      p = Math.min(p + 10, 100);
      el.style.width = p + '%';
      if (p >= 100) clearInterval(interval);
    }, 300);
  })();
</script>
</body>
</html>
